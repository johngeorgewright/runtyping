name: Pull Request

on:
  pull_request:
    branches: [master]

concurrency:
  cancel-in-progress: true
  group: ${{ github.head_ref }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24, 25]
    steps:
      - uses: ./.github/actions/test
        with:
          node-version: ${{ matrix.node-version }}
