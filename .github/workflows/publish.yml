name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  publish-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24, 25]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install
      - uses: ./.github/actions/test
        with:
          node-version: ${{ matrix.node-version }}
      - id: nvm
        run: echo "version=$(cat .nvmrc)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v7
        if: matrix.node-version == steps.nvm.outputs.version
        with:
          if-no-files-found: error
          name: dists
          path: packages/**/dist

  publish-release:
    if: github.actor != 'renovate[bot]'
    needs: [publish-build]
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: auth
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PEM }}
          permission-contents: write
          permission-pull-requests: write
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.auth.outputs.token }}

  publish-npm:
    if: needs.publish-release.outputs.releases_created == 'true'
    needs: [publish-release]
    runs-on: ubuntu-latest
    environment: NPM
    permissions:
      id-token: write
      contents: write
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJson(needs.publish-release.outputs.paths_released) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
      - run: yarn --immutable
      - uses: actions/download-artifact@v8
        with:
          name: dists
          path: ~/dists
      - name: Move dists to project
        run: | # shell
          for package in ~/dists/*
          do 
            mv "$package/dist" "packages/${package/$HOME\/dists\//}"
          done
      - working-directory: ${{ matrix.path }}
        run: yarn npm publish --access public
